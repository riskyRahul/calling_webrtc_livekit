apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
spec:
  replicas: 3
  selector:
    matchLabels:
      app: control-plane
  template:
    metadata:
      labels:
        app: control-plane
    spec:
      containers:
        - name: control-plane
          image: your-registry/control-plane:latest
          ports:
            - containerPort: 4000
          env:
            - name: PORT
              value: "4000"
            - name: TOKEN_TTL_SECONDS
              value: "300"
---
apiVersion: v1
kind: Service
metadata:
  name: control-plane
spec:
  selector:
    app: control-plane
  ports:
    - port: 4000
      targetPort: 4000
