apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-plane
spec:
  replicas: 3
  selector:
    matchLabels:
      app: data-plane
  template:
    metadata:
      labels:
        app: data-plane
    spec:
      containers:
        - name: data-plane
          image: your-registry/data-plane:latest
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              value: "5000"
---
apiVersion: v1
kind: Service
metadata:
  name: data-plane
spec:
  selector:
    app: data-plane
  ports:
    - port: 5000
      targetPort: 5000
